name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build embedded dashboard
        run: |
          cd frontend
          npm ci
          npm run build
          cd ..
          rm -rf pkg/webui/dist
          mkdir -p pkg/webui/dist
          cp -r frontend/out/. pkg/webui/dist/

      - name: Build release binaries
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X infracanvas/cmd/infracanvas/cmd.Version=${VERSION} -X infracanvas/cmd/infracanvas/cmd.GitCommit=${COMMIT} -X infracanvas/cmd/infracanvas/cmd.BuildDate=${BUILD_DATE}"

          for tgt in linux-amd64 linux-arm64 darwin-amd64 darwin-arm64; do
            GOOS=${tgt%-*} GOARCH=${tgt#*-} \
              go build -tags embed_full -ldflags "$LDFLAGS" \
                -o dist/infracanvas-${tgt} ./cmd/infracanvas
          done

          cp install-agent.sh dist/install.sh
          cp uninstall-agent.sh dist/uninstall.sh

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Install on a Linux VM

            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | bash
            ```

            The installer brings up the dashboard and prints a public URL via Cloudflare's free quick-tunnel — no firewall config or signup required. Pass `--no-tunnel` if you'd rather bind a local port directly. See the [README](https://github.com/${{ github.repository }}#readme) for full options.
