name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build agent binaries
        run: |
          mkdir -p dist
          VERSION="${GITHUB_REF_NAME}"

          GOOS=linux  GOARCH=amd64 go build -ldflags="-s -w -X infracanvas/cmd/infracanvas/cmd.Version=${VERSION}" \
            -o dist/infracanvas-linux-amd64   ./cmd/infracanvas

          GOOS=linux  GOARCH=arm64 go build -ldflags="-s -w -X infracanvas/cmd/infracanvas/cmd.Version=${VERSION}" \
            -o dist/infracanvas-linux-arm64   ./cmd/infracanvas

          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w -X infracanvas/cmd/infracanvas/cmd.Version=${VERSION}" \
            -o dist/infracanvas-darwin-amd64  ./cmd/infracanvas

          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w -X infracanvas/cmd/infracanvas/cmd.Version=${VERSION}" \
            -o dist/infracanvas-darwin-arm64  ./cmd/infracanvas

          # Also include install/uninstall scripts in release
          cp install-agent.sh dist/install.sh
          cp uninstall-agent.sh dist/uninstall.sh

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Install on your VM

            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/latest/download/install.sh | bash
            ```

            See [README](https://github.com/${{ github.repository }}#readme) for setup instructions.
