version: "3.9"

# Production deployment with automatic HTTPS via Caddy.
# Prerequisites:
#   1. A domain pointing to this server's IP (e.g. infracanvas.yourdomain.com)
#   2. Ports 80 and 443 open in your firewall
#
# Usage:
#   DOMAIN=infracanvas.yourdomain.com docker compose -f docker-compose.prod.yml up -d

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - INFRACANVAS_ADDR=:8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_WS_URL=wss://${DOMAIN}
        - NEXT_PUBLIC_API_URL=https://${DOMAIN}
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      server:
        condition: service_healthy
    environment:
      - NEXT_PUBLIC_WS_URL=wss://${DOMAIN}
      - NEXT_PUBLIC_API_URL=https://${DOMAIN}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - frontend

volumes:
  caddy_data:
  caddy_config:
