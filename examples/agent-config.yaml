# InfraCanvas agent environment file example
# Copy to /etc/infracanvas/agent.env and edit as needed.
#
# The installer (install-agent.sh) writes this file automatically.
# Override any value here, then: sudo systemctl restart infracanvas-agent

# Relay server WebSocket URL (required)
INFRACANVAS_BACKEND=ws://13.200.198.166:8080

# Shared auth token — must match INFRACANVAS_TOKEN on the relay server
# Leave empty if the relay runs without auth (dev mode)
INFRACANVAS_TOKEN=

# Discovery scope: comma-separated list of host, docker, kubernetes
INFRACANVAS_SCOPE=host,docker,kubernetes
