# Agent Configuration Example
# This file shows all available configuration options for the infracanvas agent

# Backend connection settings
backend_url: "http://localhost:8080"
auth_token: "your-auth-token-here"
tls_insecure: false

# Collection intervals (in seconds)
host_interval: 10        # How often to collect host metrics
docker_interval: 15      # How often to collect Docker data
kubernetes_interval: 20  # How often to collect Kubernetes data
heartbeat_interval: 30   # How often to send heartbeats

# Discovery scope - which layers to discover
scope:
  - host
  - docker
  - kubernetes

# Agent identity
agent_id: ""             # Leave empty for auto-generation
agent_name: "my-agent"   # Friendly name for this agent

# Features
enable_redaction: true   # Automatically redact sensitive data
enable_watchers: true    # Enable event watchers for real-time updates
